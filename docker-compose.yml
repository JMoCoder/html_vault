services:
  html-vault:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      HTML_VAULT_CONTENT: /data/content
      HTML_VAULT_META: /data/meta
      HTML_VAULT_PUBLIC: /public
      HTML_VAULT_TITLE: ${HTML_VAULT_TITLE:-HTML Vault}
      HTML_VAULT_MAX_UPLOAD_BYTES: ${HTML_VAULT_MAX_UPLOAD_BYTES:-10485760}
      HTML_VAULT_API_TOKEN: ${HTML_VAULT_API_TOKEN:-}
      HTML_VAULT_AUTH_USERNAME: ${HTML_VAULT_AUTH_USERNAME:-admin}
      HTML_VAULT_AUTH_PASSWORD: ${HTML_VAULT_AUTH_PASSWORD:-test-password}
      HTML_VAULT_USERS_FILE: ${HTML_VAULT_USERS_FILE:-/data/users.json}
      HTML_VAULT_USER_DATA_DIR: ${HTML_VAULT_USER_DATA_DIR:-/data/users}
      HTML_VAULT_SESSION_SECRET: ${HTML_VAULT_SESSION_SECRET:-html-vault-local-dev-session-secret-change-me}
      HTML_VAULT_SESSION_SECURE: ${HTML_VAULT_SESSION_SECURE:-false}
      HTML_VAULT_CORS_ORIGINS: ${HTML_VAULT_CORS_ORIGINS:-http://localhost,http://127.0.0.1}
    volumes:
      - ./data:/data
      - ./public:/public
    ports:
      - "${HTML_VAULT_HTTP_PORT:-8080}:8787"
    restart: unless-stopped
