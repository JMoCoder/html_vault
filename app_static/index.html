<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <title>HTML Vault</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/html-vault-logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/html-vault-logo.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="shell">
    <aside class="sidebar" aria-label="Vault navigation" data-i18n-attr="aria-label:sidebarAria">
      <div class="sidebar-header">
        <button class="brand" type="button" id="brand-home" aria-label="Home" title="Home" data-i18n-attr="aria-label:home,title:home">
          <img class="brand-mark" src="assets/html-vault-logo.svg" alt="" aria-hidden="true">
          <div class="brand-copy">
            <h1 id="site-title">HTML Vault</h1>
            <p id="item-count"></p>
          </div>
        </button>
        <button class="sidebar-collapse-toggle" type="button" id="sidebar-collapse" aria-label="Collapse sidebar" title="Collapse sidebar" data-i18n-attr="aria-label:collapseSidebar,title:collapseSidebar">
          <svg class="button-icon collapse-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
        </button>
      </div>

      <div class="sidebar-main">
        <button class="new-button" type="button" data-import-entry data-i18n="newButton"></button>

        <section class="nav-section">
          <h2 data-i18n="library"></h2>
          <div class="nav-list" id="library-nav"></div>
        </section>

        <section class="nav-section">
          <h2 data-i18n="collections"></h2>
          <div class="nav-list" id="collection-nav"></div>
        </section>

        <section class="nav-section">
          <h2 data-i18n="tags"></h2>
          <div class="tag-list" id="tag-nav"></div>
        </section>
      </div>

      <div class="sidebar-tools">
        <button class="theme-toggle" type="button" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme" data-i18n-attr="aria-label:toggleTheme,title:toggleTheme">
          <span id="theme-icon" aria-hidden="true">☾</span>
        </button>
        <div class="language-switcher">
          <select id="language-select" aria-label="Language">
            <option value="zh-CN">中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
          </select>
        </div>
        <button class="settings-toggle" type="button" id="settings-open" aria-label="Settings" title="Settings" data-i18n-attr="aria-label:settings,title:settings">
          <span aria-hidden="true">⚙</span>
        </button>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <h2 id="workspace-title"></h2>
        </div>
        <div class="topbar-tools">
          <div class="filter-toggle-group" role="group" aria-label="Result filters" data-i18n-attr="aria-label:resultFilters">
            <button class="filter-toggle" type="button" id="favorite-filter" aria-label="Only favorites" title="Only favorites" data-i18n-attr="aria-label:onlyFavorites,title:onlyFavorites">
              <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m12 3 2.82 5.72 6.31.92-4.57 4.45 1.08 6.28L12 17.4l-5.64 2.97 1.08-6.28-4.57-4.45 6.31-.92L12 3Z"></path>
              </svg>
            </button>
            <button class="filter-toggle active" type="button" id="archive-filter" aria-label="Show archived items" title="Show archived items" data-i18n-attr="aria-label:showArchived,title:showArchived">
              <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 7h18"></path>
                <path d="M5 7v12h14V7"></path>
                <path d="M8 7V4h8v3"></path>
                <path d="M9 12h6"></path>
              </svg>
            </button>
          </div>
          <div class="view-toggle" role="group" aria-label="View style" data-i18n-attr="aria-label:viewStyle">
            <button type="button" id="card-view" class="view-button active" data-view-mode="cards" aria-label="Card view" title="Card view" data-i18n-attr="aria-label:cardView,title:cardView">
              <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                <rect x="3" y="14" width="7" height="7" rx="1"></rect>
                <rect x="14" y="14" width="7" height="7" rx="1"></rect>
              </svg>
            </button>
            <button type="button" id="list-view" class="view-button" data-view-mode="list" aria-label="List view" title="List view" data-i18n-attr="aria-label:listView,title:listView">
              <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 6h13"></path>
                <path d="M8 12h13"></path>
                <path d="M8 18h13"></path>
                <path d="M3 6h.01"></path>
                <path d="M3 12h.01"></path>
                <path d="M3 18h.01"></path>
              </svg>
            </button>
          </div>
          <button class="magic-button" type="button" id="lucky-button" aria-label="I'm feeling lucky" title="I'm feeling lucky" data-i18n-attr="aria-label:feelingLucky,title:feelingLucky">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m15 4 5 5"></path>
              <path d="m14 5 5 5-9 9H5v-5l9-9Z"></path>
              <path d="M6 3v4"></path>
              <path d="M4 5h4"></path>
              <path d="M19 14v4"></path>
              <path d="M17 16h4"></path>
            </svg>
          </button>
          <label class="search">
            <input id="search-input" type="search" autocomplete="off" data-i18n-attr="aria-label:search,placeholder:searchPlaceholder">
          </label>
          <button class="ai-panel-toggle" type="button" id="ai-panel-open" aria-label="Open AI assistant" title="Open AI assistant" data-i18n-attr="aria-label:openGlobalAi,title:openGlobalAi">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3l1.7 4.3L18 9l-4.3 1.7L12 15l-1.7-4.3L6 9l4.3-1.7L12 3Z"></path>
              <path d="M19 14l.9 2.1L22 17l-2.1.9L19 20l-.9-2.1L16 17l2.1-.9L19 14Z"></path>
              <path d="M5 13l.8 1.8L8 16l-2.2.8L5 19l-.8-2.2L2 16l2.2-1.2L5 13Z"></path>
            </svg>
          </button>
        </div>
      </header>

      <section class="new-card" id="new-card">
        <div class="new-card-header">
          <div>
            <h3 data-i18n="createHtmlNote"></h3>
          </div>
          <span class="status-pill" id="agent-status"></span>
        </div>
        <form id="new-item-form" class="new-form">
          <select id="input-type" data-i18n-attr="aria-label:inputType">
            <option value="auto" data-i18n="inputAuto"></option>
            <option value="link" data-i18n="inputLink"></option>
            <option value="file" data-i18n="inputFile"></option>
            <option value="book" data-i18n="inputBook"></option>
            <option value="topic" data-i18n="inputTopic"></option>
          </select>
          <input id="new-item-input" type="text" data-i18n-attr="placeholder:newItemPlaceholder">
          <button type="submit" data-i18n="create"></button>
        </form>
        <p class="new-feedback" id="new-feedback"></p>
      </section>

      <section class="content-grid" id="content-grid" aria-live="polite"></section>
    </main>

    <section class="reader" id="reader" aria-label="Reader" data-i18n-attr="aria-label:readerAria" hidden>
      <div class="reader-header">
        <button class="icon-button" type="button" id="reader-close" aria-label="Close reader" data-i18n-attr="aria-label:closeReader">×</button>
        <div class="reader-heading">
          <p class="eyebrow" id="reader-source">Item</p>
          <h2 id="reader-title"></h2>
          <p id="reader-summary"></p>
          <div class="reader-tags" id="reader-tags"></div>
        </div>
        <div class="reader-actions">
          <button type="button" class="icon-action" id="reader-favorite" aria-label="Favorite" title="Favorite" data-i18n-attr="aria-label:favoriteAction,title:favoriteAction"></button>
          <button type="button" class="icon-action" id="reader-archive" aria-label="Archive" title="Archive" data-i18n-attr="aria-label:archiveAction,title:archiveAction"></button>
          <a class="button-link" id="reader-original" target="_blank" rel="noreferrer" data-i18n="original"></a>
          <button type="button" class="button-link" id="reader-copy" data-i18n="copyLink"></button>
        </div>
      </div>
      <iframe id="reader-frame" title="HTML knowledge item" data-i18n-attr="title:readerFrameTitle"></iframe>
    </section>

    <section class="settings-page" id="settings-page" aria-label="Settings" data-i18n-attr="aria-label:settings" hidden>
      <header class="settings-header">
        <div class="settings-title-row">
          <button class="icon-button" type="button" id="settings-back" aria-label="Close settings" data-i18n-attr="aria-label:closeSettings">
            ×
          </button>
          <h2 data-i18n="settingsTitle"></h2>
        </div>
      </header>

      <div class="settings-body">
        <nav class="settings-nav" aria-label="Settings sections" data-i18n-attr="aria-label:settingsSections">
          <button type="button" class="settings-tab active" data-settings-tab="library" data-i18n="libraryManagement"></button>
          <button type="button" class="settings-tab" data-settings-tab="collections" data-i18n="collectionManagement"></button>
          <button type="button" class="settings-tab" data-settings-tab="tags" data-i18n="tagManagement"></button>
          <div class="settings-divider" aria-hidden="true"></div>
          <button type="button" class="settings-tab" data-settings-tab="ai" data-i18n="aiProviders"></button>
          <button type="button" class="settings-tab" data-settings-tab="ai-assistant" data-i18n="aiKnowledgeAssistant"></button>
          <div class="settings-divider" aria-hidden="true"></div>
          <button type="button" class="settings-tab" data-settings-tab="backup" data-i18n="localBackupRestore"></button>
          <button type="button" class="settings-tab" data-settings-tab="webdav" data-i18n="webdavSettings"></button>
          <button type="button" class="settings-tab" data-settings-tab="export" data-i18n="dataExport"></button>
          <div class="settings-divider" aria-hidden="true"></div>
          <button type="button" class="settings-tab" data-settings-tab="terms" data-i18n="userAgreement"></button>
          <button type="button" class="settings-tab" data-settings-tab="about" data-i18n="aboutProject"></button>
          <button type="button" class="settings-tab" data-settings-tab="updates" data-i18n="updateDocs"></button>
        </nav>

        <div class="settings-content">
          <section class="settings-section active" data-settings-section="library">
            <div class="section-heading">
              <h3 data-i18n="libraryManagement"></h3>
              <p data-i18n="libraryManagementIntro"></p>
            </div>
            <div class="management-list" id="library-management"></div>
          </section>

          <section class="settings-section" data-settings-section="collections">
            <div class="section-heading">
              <h3 data-i18n="collectionManagement"></h3>
              <p data-i18n="collectionManagementIntro"></p>
            </div>
            <div class="management-list" id="collection-management"></div>
          </section>

          <section class="settings-section" data-settings-section="tags">
            <div class="section-heading">
              <h3 data-i18n="tagManagement"></h3>
              <p data-i18n="tagManagementIntro"></p>
            </div>
            <div class="management-list" id="tag-management"></div>
          </section>

          <section class="settings-section" data-settings-section="ai">
            <div class="section-heading">
              <h3 data-i18n="aiProviders"></h3>
              <p data-i18n="aiProviderIntro"></p>
            </div>

            <form class="settings-form" id="ai-settings-form">
              <label>
                <span data-i18n="provider"></span>
                <select id="ai-provider">
                  <option value="openai">OpenAI</option>
                  <option value="anthropic">Anthropic</option>
                  <option value="gemini">Google Gemini</option>
                  <option value="openrouter">OpenRouter</option>
                  <option value="custom" data-i18n="customProvider"></option>
                </select>
              </label>

              <label>
                <span data-i18n="currentModel"></span>
                <input id="current-model" type="text" placeholder="gpt-4.1-mini">
              </label>

              <label>
                <span data-i18n="apiBaseUrl"></span>
                <input id="api-base-url" type="url" placeholder="https://api.openai.com/v1">
              </label>

              <label>
                <span data-i18n="apiKey"></span>
                <input id="api-key" type="password" autocomplete="off" data-i18n-attr="placeholder:apiKeyPlaceholder">
              </label>

              <label>
                <span data-i18n="newModel"></span>
                <input id="new-model" type="text" placeholder="provider/model-name">
              </label>

              <div class="form-grid">
                <label>
                  <span data-i18n="temperature"></span>
                  <input id="model-temperature" type="number" min="0" max="2" step="0.1" value="0.7">
                </label>
                <label>
                  <span data-i18n="maxTokens"></span>
                  <input id="model-max-tokens" type="number" min="256" step="256" value="4096">
                </label>
              </div>

              <p class="security-note" data-i18n="keyStorageNote"></p>

              <div class="settings-actions">
                <button type="submit" data-i18n="saveProviderConfig"></button>
                <button type="button" class="secondary-button" id="test-provider" data-i18n="testConnection"></button>
              </div>
              <p class="settings-feedback" id="settings-feedback"></p>
            </form>
          </section>

          <section class="settings-section" data-settings-section="ai-assistant">
            <div class="section-heading">
              <h3 data-i18n="aiKnowledgeAssistant"></h3>
              <p data-i18n="aiKnowledgeAssistantIntro"></p>
            </div>

            <form class="settings-form" id="ai-assistant-form">
              <label>
                <span data-i18n="assistantOperation"></span>
                <select id="assistant-operation">
                  <option value="classify" data-i18n="assistantClassify"></option>
                  <option value="tag" data-i18n="assistantTag"></option>
                  <option value="review" data-i18n="assistantReview"></option>
                  <option value="custom" data-i18n="assistantCustom"></option>
                </select>
              </label>

              <label>
                <span data-i18n="assistantPrompt"></span>
                <textarea id="assistant-prompt" rows="5" data-i18n-attr="placeholder:assistantPromptPlaceholder"></textarea>
              </label>

              <p class="security-note" data-i18n="assistantImpactNote"></p>

              <div class="settings-actions">
                <button type="submit" data-i18n="submitAssistantJob"></button>
              </div>
              <p class="settings-feedback" id="assistant-feedback"></p>
            </form>
          </section>

          <section class="settings-section" data-settings-section="backup">
            <div class="section-heading">
              <h3 data-i18n="localBackupRestore"></h3>
              <p data-i18n="localBackupIntro"></p>
            </div>
            <form class="settings-form" id="backup-settings-form">
              <label class="switch-row">
                <input id="auto-backup" type="checkbox">
                <span data-i18n="autoBackup"></span>
              </label>
              <p class="security-note" data-i18n="backupScopeNote"></p>
              <div class="settings-actions">
                <button type="button" id="create-backup" data-i18n="createBackup"></button>
                <button type="button" class="secondary-button" id="restore-backup" data-i18n="restoreBackup"></button>
              </div>
              <input id="restore-backup-file" type="file" accept="application/json" hidden>
              <p class="settings-feedback" id="backup-feedback"></p>
            </form>
          </section>

          <section class="settings-section" data-settings-section="webdav">
            <div class="section-heading">
              <h3 data-i18n="webdavSettings"></h3>
              <p data-i18n="webdavIntro"></p>
            </div>
            <form class="settings-form" id="webdav-settings-form">
              <label>
                <span data-i18n="webdavUrl"></span>
                <input id="webdav-url" type="url" placeholder="https://dav.example.com/html-vault">
              </label>
              <label>
                <span data-i18n="webdavUsername"></span>
                <input id="webdav-username" type="text" autocomplete="username">
              </label>
              <label>
                <span data-i18n="webdavRemotePath"></span>
                <input id="webdav-path" type="text" placeholder="/backups/html-vault">
              </label>
              <p class="security-note" data-i18n="webdavPasswordNote"></p>
              <div class="settings-actions">
                <button type="submit" data-i18n="saveWebdav"></button>
                <button type="button" class="secondary-button" id="test-webdav" data-i18n="testConnection"></button>
              </div>
              <p class="settings-feedback" id="webdav-feedback"></p>
            </form>
          </section>

          <section class="settings-section" data-settings-section="export">
            <div class="section-heading">
              <h3 data-i18n="dataExport"></h3>
              <p data-i18n="dataExportIntro"></p>
            </div>
            <div class="settings-form">
              <div class="settings-actions">
                <button type="button" id="export-manifest" data-i18n="exportManifest"></button>
                <button type="button" class="secondary-button" id="export-preferences" data-i18n="exportPreferences"></button>
              </div>
              <p class="security-note" data-i18n="dataExportNote"></p>
              <p class="settings-feedback" id="export-feedback"></p>
            </div>
          </section>

          <section class="settings-section" data-settings-section="terms">
            <div class="section-heading">
              <h3 data-i18n="userAgreement"></h3>
              <p data-i18n="termsIntro"></p>
            </div>
            <div class="text-block">
              <p data-i18n="termsPrivateUse"></p>
              <p data-i18n="termsCopyright"></p>
              <p data-i18n="termsSecurity"></p>
            </div>
          </section>

          <section class="settings-section" data-settings-section="about">
            <div class="section-heading">
              <h3 data-i18n="aboutProject"></h3>
              <p data-i18n="aboutIntro"></p>
            </div>
            <div class="text-block">
              <p data-i18n="aboutStaticFirst"></p>
              <p data-i18n="aboutVersion"></p>
            </div>
          </section>

          <section class="settings-section" data-settings-section="updates">
            <div class="section-heading">
              <h3 data-i18n="updateDocs"></h3>
              <p data-i18n="updatesIntro"></p>
            </div>
            <div class="text-block">
              <p data-i18n="updatesChangelog"></p>
              <p data-i18n="updatesDocsLocal"></p>
              <p data-i18n="updatesNext"></p>
            </div>
          </section>
        </div>
      </div>
    </section>

    <aside class="ai-panel" id="ai-panel" aria-label="Global AI assistant" data-i18n-attr="aria-label:globalAiPanel" hidden>
      <div class="ai-panel-resize" id="ai-panel-resize" role="separator" aria-orientation="vertical" aria-label="Resize AI panel" data-i18n-attr="aria-label:resizeAiPanel"></div>
      <header class="ai-panel-header">
        <div>
          <p class="eyebrow" data-i18n="globalAiAssistant"></p>
          <h2 data-i18n="aiConversation"></h2>
        </div>
        <button class="icon-button" type="button" id="ai-panel-close" aria-label="Close AI assistant" data-i18n-attr="aria-label:closeGlobalAi">×</button>
      </header>

      <div class="ai-context-card">
        <span data-i18n="aiContext"></span>
        <strong id="ai-context-label"></strong>
      </div>

      <div class="ai-chat-log" id="ai-chat-log" aria-live="polite"></div>

      <div class="ai-panel-actions">
        <button type="button" id="ai-generate-note" data-i18n="generateHtmlNote"></button>
        <span data-i18n="aiPanelComingSoon"></span>
      </div>

      <form class="ai-chat-form" id="ai-chat-form">
        <textarea id="ai-chat-input" rows="4" data-i18n-attr="placeholder:aiChatPlaceholder"></textarea>
        <button type="submit" data-i18n="send"></button>
      </form>
    </aside>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
