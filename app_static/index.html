<!doctype html>
<html lang="en">
<head>
  <base href="/">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <title>HTMlore</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/html-lore-logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/html-lore-logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&family=Noto+Serif+SC:wght@600;900&family=Noto+Serif+JP:wght@600;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=0.9.5">
</head>
<body>
  <section class="login-screen" id="login-screen" hidden>
    <div class="login-panel">
      <div class="login-brand">
        <img class="login-logo" src="assets/html-lore-logo.svg" alt="" aria-hidden="true">
        <div>
          <p class="login-eyebrow" data-i18n="loginEyebrow"></p>
          <h1>HTMlore</h1>
        </div>
      </div>
      <form class="login-form" id="login-form">
        <label>
          <span data-i18n="loginUsername"></span>
          <input id="login-username" type="text" autocomplete="username" required>
        </label>
        <label>
          <span data-i18n="loginPassword"></span>
          <input id="login-password" type="password" autocomplete="current-password" required>
        </label>
        <button class="login-submit" type="submit" data-i18n="loginSubmit"></button>
        <p class="login-feedback" id="login-feedback"></p>
      </form>
      <p class="login-note" data-i18n="loginNoRegister"></p>
    </div>
  </section>

  <div class="shell">
    <aside class="sidebar" aria-label="Library navigation" data-i18n-attr="aria-label:sidebarAria">
      <div class="sidebar-resize" id="sidebar-resize" role="separator" aria-orientation="vertical" aria-label="Resize sidebar" data-i18n-attr="aria-label:resizeSidebar"></div>
      <div class="sidebar-header">
        <button class="brand" type="button" id="brand-home" aria-label="Home" title="Home" data-i18n-attr="aria-label:home,title:home">
          <img class="brand-mark" src="assets/html-lore-logo.svg" alt="" aria-hidden="true">
          <div class="brand-copy">
            <h1 id="site-title" class="workspace-brand-name">HTM<em>lore</em></h1>
          </div>
        </button>
        <button class="sidebar-collapse-toggle" type="button" id="sidebar-collapse" aria-label="Collapse sidebar" title="Collapse sidebar" data-i18n-attr="aria-label:collapseSidebar,title:collapseSidebar">
          <svg class="button-icon collapse-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 18l-6-6 6-6"></path>
          </svg>
        </button>
      </div>

      <div class="sidebar-main">
        <section class="nav-section" data-nav-section="library">
          <button class="nav-section-header" type="button" data-nav-section-toggle="library">
            <span data-i18n="library"></span>
            <svg class="nav-section-arrow" viewBox="0 0 16 16" aria-hidden="true">
              <path d="m5 3 5 5-5 5"></path>
            </svg>
          </button>
          <div class="nav-list" id="library-nav"></div>
        </section>

        <section class="nav-section" data-nav-section="collections">
          <button class="nav-section-header" type="button" data-nav-section-toggle="collections">
            <span data-i18n="collections"></span>
            <svg class="nav-section-arrow" viewBox="0 0 16 16" aria-hidden="true">
              <path d="m5 3 5 5-5 5"></path>
            </svg>
          </button>
          <div class="nav-list" id="collection-nav"></div>
        </section>

        <section class="nav-section" data-nav-section="tags">
          <button class="nav-section-header" type="button" data-nav-section-toggle="tags">
            <span data-i18n="tags"></span>
            <svg class="nav-section-arrow" viewBox="0 0 16 16" aria-hidden="true">
              <path d="m5 3 5 5-5 5"></path>
            </svg>
          </button>
          <div class="tag-list" id="tag-nav"></div>
        </section>
      </div>

      <div class="sidebar-tools">
        <div class="sidebar-tool-group">
          <button class="settings-toggle" type="button" id="settings-open" aria-label="Settings" title="Settings" data-i18n-attr="aria-label:settings,title:settings">
            <span aria-hidden="true">⚙</span>
          </button>
          <a class="github-link" href="https://github.com/JMoCoder/html_lore" target="_blank" rel="noreferrer" aria-label="GitHub repository" title="GitHub repository">
            <svg class="github-mark" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"></path>
            </svg>
            <span>GitHub</span>
          </a>
        </div>
        <a class="project-link" href="https://jmocoder.github.io/html_lore/" target="_blank" rel="noreferrer" aria-label="HTMlore homepage" title="HTMlore homepage">
          <img src="assets/html-lore-logo.svg" alt="" aria-hidden="true">
          <span>HTMlore</span>
        </a>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div class="topbar-tools">
          <div class="topbar-control-group">
            <button class="import-topbar-button" type="button" data-import-entry aria-label="Import HTML file" title="Import HTML file" data-i18n-attr="aria-label:importHtmlFile,title:importHtmlFile">
              <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14"></path>
                <path d="M5 12h14"></path>
              </svg>
            </button>
            <div class="filter-shell">
              <div class="filter-toggle-group" role="group" aria-label="Result filters" data-i18n-attr="aria-label:resultFilters">
                <button class="filter-toggle" type="button" id="multi-filter-toggle" aria-label="Tag filters" title="Tag filters" data-i18n-attr="aria-label:advancedFilters,title:advancedFilters">
                  <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 6h16"></path>
                    <path d="M7 12h10"></path>
                    <path d="M10 18h4"></path>
                  </svg>
                </button>
                <button class="filter-toggle" type="button" id="sort-toggle" aria-label="Sort" title="Sort" data-i18n-attr="aria-label:sort,title:sort">
                  <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M11 5h10"></path>
                    <path d="M11 12h7"></path>
                    <path d="M11 19h4"></path>
                    <path d="M4 5v14"></path>
                    <path d="m7 16-3 3-3-3"></path>
                  </svg>
                </button>
                <button class="filter-toggle" type="button" id="favorite-filter" aria-label="Only favorites" title="Only favorites" data-i18n-attr="aria-label:onlyFavorites,title:onlyFavorites">
                  <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m12 3 2.82 5.72 6.31.92-4.57 4.45 1.08 6.28L12 17.4l-5.64 2.97 1.08-6.28-4.57-4.45 6.31-.92L12 3Z"></path>
                  </svg>
                </button>
              </div>
              <div class="multi-filter-popover" id="multi-filter-popover" hidden>
                <div class="multi-filter-header">
                  <h3><span data-i18n="advancedFilters"></span><span class="multi-filter-title-count" id="multi-filter-result-count"></span></h3>
                  <div class="multi-filter-header-actions">
                    <button type="button" data-tag-match-mode="any" data-i18n="tagMatchAny"></button>
                    <button type="button" data-tag-match-mode="all" data-i18n="tagMatchAll"></button>
                  </div>
                </div>
                <div class="multi-filter-section">
                  <div class="multi-filter-options" id="multi-tag-options"></div>
                </div>
              </div>
              <div class="sort-popover" id="sort-popover" hidden>
                <button type="button" data-sort-mode="newest" data-i18n="sortNewest"></button>
                <button type="button" data-sort-mode="oldest" data-i18n="sortOldest"></button>
                <button type="button" data-sort-mode="title-az" data-i18n="sortTitleAz"></button>
                <button type="button" data-sort-mode="title-za" data-i18n="sortTitleZa"></button>
              </div>
            </div>
            <button class="magic-button" type="button" id="lucky-button" aria-label="I'm feeling lucky" title="I'm feeling lucky" data-i18n-attr="aria-label:feelingLucky,title:feelingLucky">
              <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m15 4 5 5"></path>
                <path d="m14 5 5 5-9 9H5v-5l9-9Z"></path>
                <path d="M6 3v4"></path>
                <path d="M4 5h4"></path>
                <path d="M19 14v4"></path>
                <path d="M17 16h4"></path>
              </svg>
            </button>
          </div>
          <div class="topbar-search-group">
            <label class="search">
              <input id="search-input" type="search" autocomplete="off" data-i18n-attr="aria-label:search,placeholder:searchPlaceholder">
            </label>
            <button class="ai-panel-toggle" type="button" id="ai-panel-open" aria-label="Open AI assistant" title="Open AI assistant" data-i18n-attr="aria-label:openGlobalAi,title:openGlobalAi">
              <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3l1.7 4.3L18 9l-4.3 1.7L12 15l-1.7-4.3L6 9l4.3-1.7L12 3Z"></path>
                <path d="M19 14l.9 2.1L22 17l-2.1.9L19 20l-.9-2.1L16 17l2.1-.9L19 14Z"></path>
                <path d="M5 13l.8 1.8L8 16l-2.2.8L5 19l-.8-2.2L2 16l2.2-1.2L5 13Z"></path>
              </svg>
            </button>
          </div>
        </div>
      </header>

      <input id="html-import-file" type="file" accept=".html,.htm,text/html" hidden>
      <input id="material-generate-file" type="file" accept=".html,.htm,.md,.markdown,.txt,text/html,text/markdown,text/plain" hidden>

      <section class="new-card" id="new-card">
        <div class="new-card-header">
          <div>
            <h3 data-i18n="createHtmlNote"></h3>
          </div>
        </div>
        <form id="new-item-form" class="new-form">
          <select id="input-type" data-i18n-attr="aria-label:inputType">
            <option value="auto" data-i18n="inputAuto"></option>
            <option value="link" data-i18n="inputLink"></option>
            <option value="file" data-i18n="inputFile"></option>
            <option value="book" data-i18n="inputBook"></option>
            <option value="topic" data-i18n="inputTopic"></option>
          </select>
          <input id="new-item-input" type="text" data-i18n-attr="placeholder:newItemPlaceholder">
          <button type="submit" data-i18n="create"></button>
        </form>
        <p class="new-feedback" id="new-feedback"></p>
      </section>

      <section class="content-grid" id="content-grid" aria-live="polite"></section>
    </main>

    <section class="reader" id="reader" aria-label="Reader" data-i18n-attr="aria-label:readerAria" hidden>
      <div class="reader-header">
        <button class="icon-button" type="button" id="reader-close" aria-label="Close reader" data-i18n-attr="aria-label:closeReader">×</button>
        <div class="reader-heading">
          <p class="eyebrow" id="reader-source">Item</p>
          <h2 id="reader-title"></h2>
          <div class="reader-tags" id="reader-tags"></div>
        </div>
        <div class="reader-actions">
          <button type="button" class="icon-action" id="reader-edit" aria-label="Edit metadata" title="Edit metadata" data-i18n-attr="aria-label:editMetadata,title:editMetadata"></button>
          <button type="button" class="icon-action" id="reader-favorite" aria-label="Favorite" title="Favorite" data-i18n-attr="aria-label:favoriteAction,title:favoriteAction"></button>
          <button type="button" class="icon-action" id="reader-archive" aria-label="Archive" title="Archive" data-i18n-attr="aria-label:archiveAction,title:archiveAction"></button>
          <button type="button" class="icon-action" id="reader-share" aria-label="Share" title="Share" data-i18n-attr="aria-label:shareAction,title:shareAction">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"></path>
              <path d="m16 6-4-4-4 4"></path>
              <path d="M12 2v14"></path>
            </svg>
          </button>
          <a class="icon-action" id="reader-original" target="_blank" rel="noreferrer" aria-label="Original" title="Original" data-i18n-attr="aria-label:original,title:original">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M14 3h7v7"></path>
              <path d="M10 14 21 3"></path>
              <path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"></path>
            </svg>
          </a>
          <button type="button" class="reader-ai-button" id="reader-ai-panel-open" aria-label="Open AI assistant" title="Open AI assistant" data-i18n-attr="aria-label:openGlobalAi,title:openGlobalAi">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3l1.7 4.3L18 9l-4.3 1.7L12 15l-1.7-4.3L6 9l4.3-1.7L12 3Z"></path>
              <path d="M19 14l.9 2.1L22 17l-2.1.9L19 20l-.9-2.1L16 17l2.1-.9L19 14Z"></path>
              <path d="M5 13l.8 1.8L8 16l-2.2.8L5 19l-.8-2.2L2 16l2.2-1.2L5 13Z"></path>
            </svg>
          </button>
        </div>
      </div>
      <div class="reader-frame-shell">
        <iframe id="reader-frame" title="HTML knowledge item" data-i18n-attr="title:readerFrameTitle"></iframe>
      </div>
    </section>

    <section class="settings-page" id="settings-page" aria-label="Settings" data-i18n-attr="aria-label:settings" hidden>
      <header class="settings-header">
        <div class="settings-title-row">
          <button class="icon-button" type="button" id="settings-back" aria-label="Close settings" data-i18n-attr="aria-label:closeSettings">
            ×
          </button>
          <h2 data-i18n="settingsTitle"></h2>
        </div>
      </header>

      <div class="settings-body">
        <nav class="settings-nav" aria-label="Settings sections" data-i18n-attr="aria-label:settingsSections">
          <button type="button" class="settings-tab active" data-settings-tab="basic" data-i18n="basicSettings"></button>
          <button type="button" class="settings-tab" data-settings-tab="profile" data-i18n="userProfile"></button>
          <button type="button" class="settings-tab" data-settings-tab="security" data-i18n="accountSecurity"></button>
          <div class="settings-divider" aria-hidden="true"></div>
          <button type="button" class="settings-tab" data-settings-tab="library" data-i18n="libraryManagement"></button>
          <button type="button" class="settings-tab" data-settings-tab="collections" data-i18n="collectionManagement"></button>
          <button type="button" class="settings-tab" data-settings-tab="tags" data-i18n="tagManagement"></button>
          <div class="settings-divider" aria-hidden="true"></div>
          <button type="button" class="settings-tab" data-settings-tab="backup" data-i18n="localBackupRestore"></button>
          <button type="button" class="settings-tab" data-settings-tab="webdav" data-i18n="webdavSettings"></button>
          <button type="button" class="settings-tab" data-settings-tab="export" data-i18n="dataExport"></button>
          <button type="button" class="settings-tab" data-settings-tab="shares" data-i18n="shareManagement"></button>
          <div class="settings-divider" aria-hidden="true"></div>
          <button type="button" class="settings-tab" data-settings-tab="ai" data-i18n="aiProviders"></button>
          <button type="button" class="settings-tab" data-settings-tab="ai-assistant" data-i18n="aiKnowledgeAssistant"></button>
          <button type="button" class="settings-tab" data-settings-tab="ai-conversations" data-i18n="aiConversationHistoryAll"></button>
          <div class="settings-divider" aria-hidden="true"></div>
          <button type="button" class="settings-tab" data-settings-tab="terms" data-i18n="userAgreement"></button>
          <button type="button" class="settings-tab" data-settings-tab="about" data-i18n="aboutProject"></button>
          <button type="button" class="settings-tab" data-settings-tab="updates" data-i18n="updateDocs"></button>
        </nav>

        <div class="settings-content">
          <section class="settings-section active" data-settings-section="basic">
            <div class="section-heading">
              <h3 data-i18n="basicSettings"></h3>
              <p data-i18n="basicSettingsIntro"></p>
            </div>
            <div class="settings-form">
              <div class="settings-field">
                <span data-i18n="interfaceTheme"></span>
                <div class="theme-mode-group" role="group" aria-label="Theme mode" data-i18n-attr="aria-label:interfaceTheme">
                  <button type="button" data-theme-mode="system" data-i18n="themeSystem"></button>
                  <button type="button" data-theme-mode="light" data-i18n="themeLight"></button>
                  <button type="button" data-theme-mode="dark" data-i18n="themeDark"></button>
                </div>
                <p class="settings-note" data-i18n="themeSettingsComingSoon"></p>
              </div>
              <label>
                <span data-i18n="languageSetting"></span>
                <select id="language-select" aria-label="Language">
                  <option value="zh-CN">中文</option>
                  <option value="en">English</option>
                  <option value="ja">日本語</option>
                </select>
              </label>
            </div>
          </section>

          <section class="settings-section" data-settings-section="library">
            <div class="section-heading">
              <h3 data-i18n="libraryManagement"></h3>
              <p data-i18n="libraryManagementIntro"></p>
            </div>
            <div class="management-list" id="library-management"></div>
          </section>

          <section class="settings-section" data-settings-section="collections">
            <div class="section-heading">
              <h3 data-i18n="collectionManagement"></h3>
              <p data-i18n="collectionManagementIntro"></p>
            </div>
            <div class="management-list" id="collection-management"></div>
          </section>

          <section class="settings-section" data-settings-section="tags">
            <div class="section-heading">
              <h3 data-i18n="tagManagement"></h3>
              <p data-i18n="tagManagementIntro"></p>
            </div>
            <div class="management-list" id="tag-management"></div>
          </section>

          <section class="settings-section" data-settings-section="ai">
            <div class="section-heading">
              <h3 data-i18n="aiProviders"></h3>
              <p data-i18n="aiProviderIntro"></p>
            </div>

            <form class="settings-form" id="ai-settings-form">
              <label>
                <span data-i18n="provider"></span>
                <select id="ai-provider">
                  <option value="openai-compatible">OpenAI-compatible</option>
                  <option value="fake">Fake Provider</option>
                </select>
              </label>

              <label>
                <span data-i18n="currentModel"></span>
                <input id="current-model" type="text" placeholder="gpt-5.5">
              </label>

              <label>
                <span data-i18n="apiBaseUrl"></span>
                <input id="api-base-url" type="url" placeholder="https://api.example.com/v1">
              </label>

              <label>
                <span data-i18n="apiKey"></span>
                <input id="api-key" type="password" autocomplete="off" data-i18n-attr="placeholder:apiKeyPlaceholder">
              </label>

              <label>
                <span data-i18n="newModel"></span>
                <input id="new-model" type="text" placeholder="provider/model-name">
              </label>

              <div class="form-grid">
                <label>
                  <span data-i18n="temperature"></span>
                  <input id="model-temperature" type="number" min="0" max="2" step="0.1" value="0.7">
                </label>
                <label>
                  <span data-i18n="maxTokens"></span>
                  <input id="model-max-tokens" type="number" min="256" step="256" value="4096">
                </label>
              </div>

              <p class="security-note" data-i18n="keyStorageNote"></p>

              <div class="settings-actions">
                <button type="submit" data-i18n="saveProviderConfig"></button>
                <button type="button" class="secondary-button" id="test-provider" data-i18n="testConnection"></button>
              </div>
              <p class="settings-feedback" id="settings-feedback"></p>
            </form>

            <div class="ai-run-history">
              <div class="section-heading">
                <h3 data-i18n="aiRunHistory"></h3>
                <p data-i18n="aiRunHistoryIntro"></p>
              </div>
              <div class="settings-actions ai-run-actions">
                <button type="button" class="secondary-button" id="ai-run-refresh" data-i18n="refreshAiRuns"></button>
              </div>
              <div class="ai-run-list" id="ai-run-list"></div>
              <p class="settings-feedback" id="ai-run-feedback"></p>
            </div>
          </section>

          <section class="settings-section" data-settings-section="ai-assistant">
            <div class="section-heading">
              <h3 data-i18n="aiKnowledgeAssistant"></h3>
              <p data-i18n="aiKnowledgeAssistantIntro"></p>
            </div>

            <form class="settings-form" id="ai-assistant-form">
              <label>
                <span data-i18n="assistantOperation"></span>
                <select id="assistant-operation">
                  <option value="classify" data-i18n="assistantClassify"></option>
                  <option value="tag" data-i18n="assistantTag"></option>
                  <option value="review" data-i18n="assistantReview"></option>
                  <option value="custom" data-i18n="assistantCustom"></option>
                </select>
              </label>

              <label>
                <span data-i18n="assistantPrompt"></span>
                <textarea id="assistant-prompt" rows="5" data-i18n-attr="placeholder:assistantPromptPlaceholder"></textarea>
              </label>

              <p class="security-note" data-i18n="assistantImpactNote"></p>

              <div class="settings-actions">
                <button type="submit" data-i18n="submitAssistantJob"></button>
              </div>
              <p class="settings-feedback" id="assistant-feedback"></p>
            </form>
          </section>

          <section class="settings-section" data-settings-section="ai-conversations">
            <div class="section-heading">
              <h3 data-i18n="aiConversationHistoryAll"></h3>
              <p data-i18n="aiConversationHistoryAllIntro"></p>
            </div>
            <div class="settings-form">
              <div class="settings-actions">
                <button type="button" class="secondary-button" id="ai-conversation-refresh" data-i18n="refreshConversations"></button>
              </div>
