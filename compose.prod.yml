# Optional public-facing example with Caddy Basic Auth in front of the app.
# The default self-hosted deployment is docker-compose.yml.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      HTML_VAULT_CONTENT: /data/content
      HTML_VAULT_META: /data/meta
      HTML_VAULT_PUBLIC: /public
      HTML_VAULT_TITLE: ${HTML_VAULT_TITLE:-HTML Vault}
      HTML_VAULT_MAX_UPLOAD_BYTES: ${HTML_VAULT_MAX_UPLOAD_BYTES:-10485760}
      HTML_VAULT_API_TOKEN: ${HTML_VAULT_API_TOKEN:?Set HTML_VAULT_API_TOKEN in .env}
      HTML_VAULT_AUTH_USERNAME: ${HTML_VAULT_AUTH_USERNAME:-}
      HTML_VAULT_AUTH_PASSWORD: ${HTML_VAULT_AUTH_PASSWORD:-}
      HTML_VAULT_SESSION_SECRET: ${HTML_VAULT_SESSION_SECRET:-}
      HTML_VAULT_SESSION_SECURE: ${HTML_VAULT_SESSION_SECURE:-true}
      HTML_VAULT_CORS_ORIGINS: ${HTML_VAULT_CORS_ORIGINS:-http://localhost,http://127.0.0.1}
    volumes:
      - ./data/content:/data/content
      - ./data/meta:/data/meta
      - ./public:/public
    expose:
      - "8787"
    restart: unless-stopped

  web:
    image: caddy:2-alpine
    depends_on:
      - api
    env_file:
      - .env
    ports:
      - "${HTML_VAULT_HTTP_PORT:-8080}:80"
    volumes:
      - ./public:/srv/html-vault/public:ro
      - ./deploy/caddy-basic-auth.Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
