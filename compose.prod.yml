# Optional public-facing example with Caddy Basic Auth in front of the app.
# The default self-hosted deployment is docker-compose.yml.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      HTML_LORE_CONTENT: /data/content
      HTML_LORE_META: /data/meta
      HTML_LORE_PUBLIC: /public
      HTML_LORE_TITLE: ${HTML_LORE_TITLE:-HTMlore}
      HTML_LORE_MAX_UPLOAD_BYTES: ${HTML_LORE_MAX_UPLOAD_BYTES:-10485760}
      HTML_LORE_API_TOKEN: ${HTML_LORE_API_TOKEN:?Set HTML_LORE_API_TOKEN in .env}
      HTML_LORE_AUTH_USERNAME: ${HTML_LORE_AUTH_USERNAME:-}
      HTML_LORE_AUTH_PASSWORD: ${HTML_LORE_AUTH_PASSWORD:-}
      HTML_LORE_USERS_FILE: ${HTML_LORE_USERS_FILE:-/data/users.json}
      HTML_LORE_USER_DATA_DIR: ${HTML_LORE_USER_DATA_DIR:-/data/users}
      HTML_LORE_SESSION_SECRET: ${HTML_LORE_SESSION_SECRET:-}
      HTML_LORE_SESSION_SECURE: ${HTML_LORE_SESSION_SECURE:-true}
      HTML_LORE_CORS_ORIGINS: ${HTML_LORE_CORS_ORIGINS:-http://localhost,http://127.0.0.1}
    volumes:
      - ./data:/data
      - ./public:/public
    expose:
      - "8787"
    restart: unless-stopped

  web:
    image: caddy:2-alpine
    depends_on:
      - api
    env_file:
      - .env
    ports:
      - "${HTML_LORE_HTTP_PORT:-8080}:80"
    volumes:
      - ./public:/srv/html-lore/public:ro
      - ./deploy/caddy-basic-auth.Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
